name: Production Docker Image CI / CD

on:
  push:
    branches: ["master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/acayseth/iivineri:latest
            ghcr.io/acayseth/iivineri:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook
        run: |
          curl -fsSL -XPOST \
          'https://webhook.vieru.hellnet.eu/restart-deployment?namespace=default&deployment_name=iivineri' \
              --header 'Authorization: Bearer ${{ secrets.WEBHOOK_TOKEN }}'
